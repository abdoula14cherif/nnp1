
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NNP — Inscription</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --cyan: #00e5ff;
    --blue: #0055ff;
    --deep: #04050e;
    --card: #080a18;
    --border: rgba(0,229,255,0.12);
    --border-focus: rgba(0,229,255,0.5);
    --text: #e8f4ff;
    --muted: rgba(255,255,255,0.35);
    --error: #ff4d6d;
    --success: #00ffaa;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    min-height: 100vh;
    background: var(--deep);
    font-family: 'Syne', sans-serif;
    color: var(--text);
    overflow-x: hidden;
  }

  /* ── Background ── */
  .bg {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 10% 0%, rgba(0,85,255,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 90% 100%, rgba(0,229,255,0.08) 0%, transparent 60%);
  }

  .bg-grid {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 52px 52px;
  }

  /* Moving particles */
  .particles { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
  .particle {
    position: absolute;
    width: 2px; height: 2px;
    border-radius: 50%;
    background: var(--cyan);
    opacity: 0;
    animation: float linear infinite;
  }
  @keyframes float {
    0%   { transform: translateY(100vh) translateX(0); opacity: 0; }
    10%  { opacity: 0.6; }
    90%  { opacity: 0.3; }
    100% { transform: translateY(-20px) translateX(40px); opacity: 0; }
  }

  /* ── Layout ── */
  .page {
    position: relative; z-index: 10;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  /* ── Logo header ── */
  .logo-header {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    margin-bottom: 36px;
    animation: fadeDown 0.8s cubic-bezier(0.16,1,0.3,1) both;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-bars {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    height: 32px;
  }

  .lb {
    width: 5px;
    border-radius: 2px 2px 1px 1px;
    animation: barPop 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  .lb-1 { height: 32px; background: linear-gradient(180deg,#00e5ff,#0055ff); animation-delay:0.1s; }
  .lb-2 { height: 20px; background: linear-gradient(180deg,rgba(0,229,255,.6),rgba(0,85,255,.6)); animation-delay:0.15s; }
  .lb-3 { height: 28px; background: linear-gradient(180deg,#00e5ff,#0055ff); animation-delay:0.2s; }
  .lb-4 { height: 14px; background: linear-gradient(180deg,rgba(0,229,255,.35),rgba(0,85,255,.35)); animation-delay:0.25s; }
  .lb-5 { height: 32px; background: linear-gradient(180deg,#00e5ff,#0055ff); animation-delay:0.3s; box-shadow: 0 0 10px rgba(0,229,255,0.6); }

  @keyframes barPop {
    from { transform: scaleY(0); transform-origin: bottom; }
    to   { transform: scaleY(1); transform-origin: bottom; }
  }

  .logo-nnp {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    letter-spacing: 5px;
    background: linear-gradient(160deg, #fff 0%, #c8f0ff 40%, var(--cyan) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 16px rgba(0,229,255,0.3));
    line-height: 1;
  }

  .logo-sub {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 3.5px;
    color: rgba(0,229,255,0.4);
    text-transform: uppercase;
    text-align: center;
  }

  /* ── Card ── */
  .card {
    width: 100%;
    max-width: 520px;
    background: linear-gradient(145deg, #0a0c1e 0%, #07091a 100%);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 40px 44px 44px;
    position: relative;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(0,229,255,0.04),
      0 0 60px rgba(0,85,255,0.1),
      0 40px 80px rgba(0,0,0,0.5);
    animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.1s both;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 10%; right: 10%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    opacity: 0.5;
  }

  /* Scanline */
  .card::after {
    content: '';
    position: absolute;
    left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,229,255,0.1), transparent);
    animation: scan 5s linear infinite;
    pointer-events: none;
  }
  @keyframes scan {
    from { top: 0; opacity:0; }
    5%   { opacity:1; }
    95%  { opacity:1; }
    to   { top: 100%; opacity:0; }
  }

  /* Corner accents */
  .corner { position: absolute; width: 14px; height: 14px; }
  .c-tl { top: 12px; left: 12px; border-top: 1.5px solid rgba(0,229,255,0.35); border-left: 1.5px solid rgba(0,229,255,0.35); }
  .c-tr { top: 12px; right: 12px; border-top: 1.5px solid rgba(0,229,255,0.35); border-right: 1.5px solid rgba(0,229,255,0.35); }
  .c-bl { bottom: 12px; left: 12px; border-bottom: 1.5px solid rgba(0,229,255,0.35); border-left: 1.5px solid rgba(0,229,255,0.35); }
  .c-br { bottom: 12px; right: 12px; border-bottom: 1.5px solid rgba(0,229,255,0.35); border-right: 1.5px solid rgba(0,229,255,0.35); }

  /* ── Title ── */
  .card-title {
    font-size: 22px;
    font-weight: 800;
    color: #fff;
    margin-bottom: 4px;
    letter-spacing: -0.3px;
  }

  .card-subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2.5px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 32px;
  }

  /* ── Form ── */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 7px;
  }

  .field.full { grid-column: 1 / -1; }

  label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(0,229,255,0.6);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  label .req {
    color: var(--cyan);
    font-size: 12px;
    line-height: 1;
  }

  .input-wrap {
    position: relative;
  }

  .input-wrap .icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.35;
    font-size: 14px;
    pointer-events: none;
  }

  input, select {
    width: 100%;
    background: rgba(0,229,255,0.03);
    border: 1px solid rgba(0,229,255,0.1);
    border-radius: 12px;
    padding: 13px 14px 13px 38px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    -webkit-appearance: none;
    appearance: none;
  }

  select {
    cursor: pointer;
    padding-right: 38px;
  }

  .select-arrow {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    opacity: 0.4;
    font-size: 11px;
  }

  input::placeholder { color: rgba(255,255,255,0.18); }
  input:focus, select:focus {
    border-color: var(--border-focus);
    background: rgba(0,229,255,0.05);
    box-shadow: 0 0 0 3px rgba(0,229,255,0.08), 0 0 20px rgba(0,229,255,0.05);
  }

  input.error { border-color: var(--error); }

  /* Password wrapper */
  .eye-btn {
    position: absolute;
    right: 12px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 16px;
    padding: 4px;
    transition: color 0.2s;
  }
  .eye-btn:hover { color: var(--cyan); }

  /* ── Pay selector ── */
  .pay-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  .pay-option {
    position: relative;
  }

  .pay-option input[type="radio"] {
    position: absolute; opacity: 0; width: 0; height: 0;
  }

  .pay-label {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 14px 8px;
    border: 1px solid rgba(0,229,255,0.1);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    background: rgba(0,229,255,0.02);
  }

  .pay-label:hover {
    border-color: rgba(0,229,255,0.3);
    background: rgba(0,229,255,0.05);
  }

  .pay-option input[type="radio"]:checked + .pay-label {
    border-color: var(--cyan);
    background: rgba(0,229,255,0.08);
    box-shadow: 0 0 16px rgba(0,229,255,0.1);
  }

  .pay-icon { font-size: 22px; }

  .pay-name {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 1.5px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .pay-option input[type="radio"]:checked + .pay-label .pay-name {
    color: var(--cyan);
  }

  /* ── Parrainage ── */
  .referral-wrap {
    position: relative;
  }

  .referral-badge {
    position: absolute;
    right: 12px; top: 50%;
    transform: translateY(-50%);
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    letter-spacing: 1.5px;
    padding: 3px 8px;
    border-radius: 20px;
    background: rgba(0,255,170,0.1);
    color: var(--success);
    border: 1px solid rgba(0,255,170,0.2);
    text-transform: uppercase;
    display: none;
  }

  .referral-badge.visible { display: block; }

  /* ── Divider ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 8px 0;
  }
  .divider-line { flex: 1; height: 1px; background: rgba(0,229,255,0.08); }
  .divider-text {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.15);
    text-transform: uppercase;
  }

  /* ── Submit ── */
  .btn-submit {
    width: 100%;
    padding: 16px;
    margin-top: 8px;
    background: linear-gradient(135deg, #0044dd, #0099ee);
    border: none;
    border-radius: 14px;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1.5px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.15s, box-shadow 0.2s;
    text-transform: uppercase;
    box-shadow: 0 4px 30px rgba(0,85,255,0.35);
  }

  .btn-submit::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
    transition: left 0.5s;
  }

  .btn-submit:hover::before { left: 100%; }
  .btn-submit:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 40px rgba(0,85,255,0.5);
  }
  .btn-submit:active { transform: translateY(0); }

  .btn-submit:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }

  .btn-inner {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  /* Spinner */
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Alert ── */
  .alert {
    padding: 12px 16px;
    border-radius: 12px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    display: none;
    align-items: center;
    gap: 10px;
    margin-top: 14px;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .alert.error {
    display: flex;
    background: rgba(255,77,109,0.08);
    border: 1px solid rgba(255,77,109,0.25);
    color: #ff8fa3;
  }

  .alert.success {
    display: flex;
    background: rgba(0,255,170,0.06);
    border: 1px solid rgba(0,255,170,0.2);
    color: var(--success);
  }

  /* ── Footer ── */
  .card-footer {
    margin-top: 22px;
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--muted);
  }

  .card-footer a {
    color: var(--cyan);
    text-decoration: none;
    transition: opacity 0.2s;
  }
  .card-footer a:hover { opacity: 0.7; }

  /* ── Security badge ── */
  .security-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-top: 20px;
    animation: fadeUp 1s cubic-bezier(0.16,1,0.3,1) 0.4s both;
  }

  .sec-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 1.5px;
    color: rgba(255,255,255,0.18);
    text-transform: uppercase;
  }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Responsive ── */
  @media (max-width: 560px) {
    .card { padding: 32px 24px 36px; }
    .form-grid { grid-template-columns: 1fr; }
    .field.full { grid-column: 1; }
    .pay-grid { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>

<div class="bg"></div>
<div class="bg-grid"></div>

<!-- Particles -->
<div class="particles" id="particles"></div>

<div class="page">

  <!-- Logo -->
  <div class="logo-header">
    <div class="logo-row">
      <div class="logo-bars">
        <div class="lb lb-1"></div>
        <div class="lb lb-2"></div>
        <div class="lb lb-3"></div>
        <div class="lb lb-4"></div>
        <div class="lb lb-5"></div>
      </div>
      <div class="logo-nnp">NNP</div>
    </div>
    <div class="logo-sub">New Numeric Platform</div>
  </div>

  <!-- Card -->
  <div class="card">
    <div class="corner c-tl"></div>
    <div class="corner c-tr"></div>
    <div class="corner c-bl"></div>
    <div class="corner c-br"></div>

    <div class="card-title">Créer un compte</div>
    <div class="card-subtitle">Rejoignez la plateforme · Étape 1/2</div>

    <div id="alertBox" class="alert"></div>

    <div class="form-grid">

      <!-- Nom complet -->
      <div class="field full">
        <label><span class="req">*</span> Nom complet</label>
        <div class="input-wrap">
          <span class="icon">👤</span>
          <input type="text" id="nom" placeholder="Ex: Jean Dupont" autocomplete="name">
        </div>
      </div>

      <!-- Numéro de téléphone -->
      <div class="field full">
        <label><span class="req">*</span> Numéro de téléphone</label>
        <div class="input-wrap">
          <span class="icon">📱</span>
          <input type="tel" id="telephone" placeholder="Ex: +225 07 00 00 00 00" autocomplete="tel">
        </div>
      </div>

      <!-- Email -->
      <div class="field full">
        <label><span class="req">*</span> Adresse e-mail</label>
        <div class="input-wrap">
          <span class="icon">✉️</span>
          <input type="email" id="email" placeholder="exemple@mail.com" autocomplete="email">
        </div>
      </div>

      <!-- Mot de passe -->
      <div class="field">
        <label><span class="req">*</span> Mot de passe</label>
        <div class="input-wrap">
          <span class="icon">🔒</span>
          <input type="password" id="motdepasse" placeholder="••••••••" autocomplete="new-password">
          <button class="eye-btn" type="button" onclick="togglePass('motdepasse', this)">👁</button>
        </div>
      </div>

      <!-- Confirmer -->
      <div class="field">
        <label><span class="req">*</span> Confirmer</label>
        <div class="input-wrap">
          <span class="icon">🔑</span>
          <input type="password" id="confirm" placeholder="••••••••" autocomplete="new-password">
          <button class="eye-btn" type="button" onclick="togglePass('confirm', this)">👁</button>
        </div>
      </div>

      <!-- Choix du Pay -->
      <div class="field full">
        <label><span class="req">*</span> Choisir votre moyen de paiement</label>
        <div class="pay-grid">
          <div class="pay-option">
            <input type="radio" name="pay" id="pay-om" value="Orange Money">
            <label class="pay-label" for="pay-om">
              <span class="pay-icon">🟠</span>
              <span class="pay-name">Orange Money</span>
            </label>
          </div>
          <div class="pay-option">
            <input type="radio" name="pay" id="pay-momo" value="MTN MoMo">
            <label class="pay-label" for="pay-momo">
              <span class="pay-icon">🟡</span>
              <span class="pay-name">MTN MoMo</span>
            </label>
          </div>
          <div class="pay-option">
            <input type="radio" name="pay" id="pay-wave" value="Wave">
            <label class="pay-label" for="pay-wave">
              <span class="pay-icon">🔵</span>
              <span class="pay-name">Wave</span>
            </label>
          </div>
          <div class="pay-option">
            <input type="radio" name="pay" id="pay-moov" value="Moov Money">
            <label class="pay-label" for="pay-moov">
              <span class="pay-icon">🟣</span>
              <span class="pay-name">Moov Money</span>
            </label>
          </div>
          <div class="pay-option">
            <input type="radio" name="pay" id="pay-free" value="Free Money">
            <label class="pay-label" for="pay-free">
              <span class="pay-icon">🟢</span>
              <span class="pay-name">Free Money</span>
            </label>
          </div>
          <div class="pay-option">
            <input type="radio" name="pay" id="pay-other" value="Autre">
            <label class="pay-label" for="pay-other">
              <span class="pay-icon">💳</span>
              <span class="pay-name">Autre</span>
            </label>
          </div>
        </div>
      </div>

      <!-- Code parrainage -->
      <div class="field full">
        <label>Code de parrainage <span style="color:var(--muted);font-size:9px;">(optionnel)</span></label>
        <div class="input-wrap referral-wrap">
          <span class="icon">🎁</span>
          <input type="text" id="parrainage" placeholder="Ex: NNP-ABC123" style="text-transform:uppercase;" oninput="checkReferral(this)">
          <span class="referral-badge" id="referralBadge">✓ Valide</span>
        </div>
      </div>

    </div>

    <!-- Submit -->
    <button class="btn-submit" id="submitBtn" onclick="handleSubmit()">
      <div class="btn-inner">
        <div class="spinner" id="spinner"></div>
        <span id="btnText">Créer mon compte →</span>
      </div>
    </button>

    <!-- Footer -->
    <div class="card-footer">
      Déjà inscrit ? <a href="login.html">Se connecter</a>
    </div>

  </div>

  <!-- Security row -->
  <div class="security-row">
    <div class="sec-item">🔐 Données chiffrées</div>
    <div class="sec-item">⚡ Activation rapide</div>
    <div class="sec-item">🌍 Réseau mondial</div>
  </div>

</div>

<script>
  // ── Supabase Init ──
  const { createClient } = supabase;
  const sb = createClient(
    'https://erflpsvmzzzimwghtyws.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVyZmxwc3Ztenp6aW13Z2h0eXdzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxOTE3ODksImV4cCI6MjA5MTc2Nzc4OX0._EDOiDj__5qSxb0OIT59KNt-90elU0ZjECZGHZRkjrI'
  );

  // ── Particles ──
  const container = document.getElementById('particles');
  for (let i = 0; i < 25; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.animationDuration = (8 + Math.random() * 14) + 's';
    p.style.animationDelay = (Math.random() * 10) + 's';
    p.style.width = p.style.height = (Math.random() > 0.6 ? 3 : 2) + 'px';
    p.style.opacity = 0;
    container.appendChild(p);
  }

  // ── Toggle password ──
  function togglePass(id, btn) {
    const inp = document.getElementById(id);
    if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
    else { inp.type = 'password'; btn.textContent = '👁'; }
  }

  // ── Referral check ──
  function checkReferral(input) {
    const badge = document.getElementById('referralBadge');
    const val = input.value.trim();
    badge.classList.toggle('visible', val.length >= 6);
  }

  // ── Show alert ──
  function showAlert(msg, type = 'error') {
    const box = document.getElementById('alertBox');
    box.className = 'alert ' + type;
    box.innerHTML = (type === 'error' ? '⚠️ ' : '✅ ') + msg;
    box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function hideAlert() {
    document.getElementById('alertBox').style.display = 'none';
  }

  // ── Loading state ──
  function setLoading(loading) {
    const btn = document.getElementById('submitBtn');
    const spinner = document.getElementById('spinner');
    const text = document.getElementById('btnText');
    btn.disabled = loading;
    spinner.style.display = loading ? 'block' : 'none';
    text.textContent = loading ? 'Création en cours...' : 'Créer mon compte →';
  }

  // ── Get selected pay ──
  function getSelectedPay() {
    const checked = document.querySelector('input[name="pay"]:checked');
    return checked ? checked.value : null;
  }

  // ── Submit ──
  async function handleSubmit() {
    hideAlert();

    const nom        = document.getElementById('nom').value.trim();
    const telephone  = document.getElementById('telephone').value.trim();
    const email      = document.getElementById('email').value.trim();
    const mdp        = document.getElementById('motdepasse').value;
    const confirm    = document.getElementById('confirm').value;
    const pay        = getSelectedPay();
    const parrainage = document.getElementById('parrainage').value.trim().toUpperCase();

    // Validations
    if (!nom) return showAlert('Veuillez entrer votre nom complet.');
    if (!telephone) return showAlert('Veuillez entrer votre numéro de téléphone.');
    if (!email || !email.includes('@')) return showAlert('Adresse e-mail invalide.');
    if (mdp.length < 6) return showAlert('Le mot de passe doit contenir au moins 6 caractères.');
    if (mdp !== confirm) return showAlert('Les mots de passe ne correspondent pas.');
    if (!pay) return showAlert('Veuillez choisir votre moyen de paiement.');

    setLoading(true);

    try {
      // 1. Create auth user
      const { data: authData, error: authError } = await sb.auth.signUp({
        email,
        password: mdp,
        options: {
          data: { nom, telephone, pay, parrainage }
        }
      });

      if (authError) throw authError;

      // 2. Insert profile in DB
      const { error: dbError } = await sb.from('utilisateurs').insert([{
        id: authData.user?.id,
        nom,
        telephone,
        email,
        pay,
        code_parrainage: parrainage || null,
        statut: 'en_attente',
        created_at: new Date().toISOString()
      }]);

      if (dbError) console.warn('DB insert warning:', dbError.message);

      // Success
      showAlert('Compte créé avec succès ! Redirection vers l\'activation...', 'success');
      setTimeout(() => {
        window.location.href = 'activation.html';
      }, 2000);

    } catch (err) {
      console.error(err);
      if (err.message?.includes('already registered')) {
        showAlert('Cet e-mail est déjà utilisé. Veuillez vous connecter.');
      } else {
        showAlert('Erreur : ' + (err.message || 'Une erreur est survenue.'));
      }
      setLoading(false);
    }
  }

  // ── Enter key ──
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleSubmit();
  });
</script>

</body>
</html>
