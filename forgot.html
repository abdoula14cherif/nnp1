<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NNP — Mot de passe oublié</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--orange:#ff8c00;--orange-l:#ffaa33;--cyan:#00c8ff;--navy:#0a0f1e;--card:#111827;--card2:#0f1b2d;--border:rgba(255,255,255,0.08);--text:#e8f0ff;--muted:rgba(255,255,255,0.38);--error:#ff4d6d;--ok:#00e5a0;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100vh;background:var(--navy);font-family:'Nunito',sans-serif;color:var(--text);overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 60% 50% at 50% -10%,rgba(255,140,0,.12) 0%,transparent 60%),radial-gradient(ellipse 50% 40% at 50% 100%,rgba(0,85,200,.15) 0%,transparent 60%);pointer-events:none;}
.gbg{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:48px 48px;}
.page{position:relative;z-index:10;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:36px 16px 52px;}

/* LOGO */
.lhdr{display:flex;flex-direction:column;align-items:center;gap:4px;margin-bottom:26px;animation:fadeD .7s cubic-bezier(.16,1,.3,1) both;}
.lrow{display:flex;align-items:center;gap:10px;}
.lbars{display:flex;align-items:flex-end;gap:3px;height:28px;}
.lb{width:5px;border-radius:2px 2px 1px 1px;animation:bpop .6s cubic-bezier(.34,1.56,.64,1) both;}
.lb1{height:28px;background:linear-gradient(180deg,var(--cyan),#0044ff);animation-delay:.1s;}
.lb2{height:17px;background:linear-gradient(180deg,rgba(0,200,255,.6),rgba(0,68,255,.6));animation-delay:.15s;}
.lb3{height:24px;background:linear-gradient(180deg,var(--cyan),#0044ff);animation-delay:.2s;}
.lb4{height:12px;background:linear-gradient(180deg,rgba(0,200,255,.3),rgba(0,68,255,.3));animation-delay:.25s;}
.lb5{height:28px;background:linear-gradient(180deg,var(--cyan),#0044ff);animation-delay:.3s;box-shadow:0 0 10px rgba(0,200,255,.5);}
@keyframes bpop{from{transform:scaleY(0);transform-origin:bottom;}to{transform:scaleY(1);transform-origin:bottom;}}
.lnnp{font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:5px;line-height:1;background:linear-gradient(160deg,#fff 0%,#c8f0ff 40%,var(--cyan) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 12px rgba(0,200,255,.3));}
.lsub{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:3.5px;color:rgba(0,200,255,.45);text-transform:uppercase;}

/* CARD */
.card{width:100%;max-width:420px;background:linear-gradient(160deg,var(--card) 0%,var(--card2) 100%);border:1px solid var(--border);border-radius:24px;padding:36px 28px 36px;position:relative;overflow:hidden;box-shadow:0 0 0 1px rgba(255,255,255,.03),0 0 60px rgba(120,60,0,.12),0 32px 64px rgba(0,0,0,.5);animation:fadeU .8s cubic-bezier(.16,1,.3,1) .1s both;}
.card::before{content:'';position:absolute;top:0;left:10%;right:10%;height:2px;background:linear-gradient(90deg,transparent,var(--orange-l),transparent);opacity:.6;}
.cn{position:absolute;width:14px;height:14px;}
.ctl{top:12px;left:12px;border-top:1.5px solid rgba(255,140,0,.4);border-left:1.5px solid rgba(255,140,0,.4);}
.ctr{top:12px;right:12px;border-top:1.5px solid rgba(255,140,0,.4);border-right:1.5px solid rgba(255,140,0,.4);}
.cbl{bottom:12px;left:12px;border-bottom:1.5px solid rgba(0,200,255,.3);border-left:1.5px solid rgba(0,200,255,.3);}
.cbr{bottom:12px;right:12px;border-bottom:1.5px solid rgba(0,200,255,.3);border-right:1.5px solid rgba(0,200,255,.3);}

/* STEPS */
.step-view{display:none;}
.step-view.active{display:block;}

/* Icon */
.wicon{font-size:48px;margin-bottom:12px;display:block;text-align:center;animation:bounce 1s ease .4s both;}
@keyframes bounce{0%{transform:scale(0);opacity:0;}70%{transform:scale(1.15);}100%{transform:scale(1);opacity:1;}}

.ctitle{font-size:22px;font-weight:900;color:#fff;letter-spacing:-.3px;margin-bottom:3px;text-align:center;}
.ctitle span{color:var(--orange-l);}
.cstep{font-family:'DM Mono',monospace;font-size:9.5px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:24px;text-align:center;line-height:1.5;}

/* ALERT */
.alert{padding:11px 14px;border-radius:12px;font-size:12px;font-weight:700;display:none;align-items:center;gap:8px;margin-bottom:16px;animation:slin .3s ease;}
.alert.err{display:flex;background:rgba(255,77,109,.09);border:1px solid rgba(255,77,109,.25);color:#ff8fa3;}
.alert.ok{display:flex;background:rgba(0,229,160,.07);border:1px solid rgba(0,229,160,.22);color:var(--ok);}
@keyframes slin{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}

/* FORM */
.f{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
label{font-size:11px;font-weight:800;letter-spacing:1.5px;color:rgba(255,255,255,.48);text-transform:uppercase;}
.iw{position:relative;}
.iw .ic{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none;opacity:.5;}
input{width:100%;background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.08);border-radius:12px;padding:13px 13px 13px 40px;color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;outline:none;transition:border-color .2s,box-shadow .2s,background .2s;}
input::placeholder{color:rgba(255,255,255,.18);font-weight:400;}
input:focus{border-color:var(--orange-l);background:rgba(255,170,51,.05);box-shadow:0 0 0 3px rgba(255,140,0,.1);}
.eye{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:15px;padding:4px;transition:color .2s;}
.eye:hover{color:var(--orange-l);}

/* BTN */
.btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--orange),var(--orange-l));border:none;border-radius:14px;color:#fff;font-family:'Nunito',sans-serif;font-size:15px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;position:relative;overflow:hidden;transition:transform .15s,box-shadow .2s;box-shadow:0 4px 28px rgba(255,140,0,.3);}
.btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);transition:left .5s;}
.btn:hover::before{left:100%;}
.btn:hover{transform:translateY(-1px);box-shadow:0 8px 36px rgba(255,140,0,.45);}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.bi{display:flex;align-items:center;justify-content:center;gap:10px;}
.sp{width:17px;height:17px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg);}}

/* SUCCESS */
.success-box{text-align:center;padding:10px 0 6px;}
.s-icon{font-size:56px;margin-bottom:14px;display:block;animation:bounce 1s ease both;}
.s-title{font-size:20px;font-weight:900;color:#fff;margin-bottom:8px;}
.s-msg{font-size:14px;font-weight:600;color:var(--muted);line-height:1.6;margin-bottom:24px;}
.s-email{color:var(--ok);font-weight:800;}

/* BACK LINK */
.back{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:22px;font-size:13px;font-weight:700;color:var(--muted);text-decoration:none;transition:color .2s;}
.back:hover{color:var(--cyan);}

@keyframes fadeU{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeD{from{opacity:0;transform:translateY(-16px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<div class="gbg"></div>
<div class="page">

  <div class="lhdr">
    <div class="lrow">
      <div class="lbars"><div class="lb lb1"></div><div class="lb lb2"></div><div class="lb lb3"></div><div class="lb lb4"></div><div class="lb lb5"></div></div>
      <div class="lnnp">NNP</div>
    </div>
    <div class="lsub">New Numeric Platform</div>
  </div>

  <div class="card">
    <div class="cn ctl"></div><div class="cn ctr"></div><div class="cn cbl"></div><div class="cn cbr"></div>

    <!-- STEP 1 : Saisir email -->
    <div class="step-view active" id="step1">
      <span class="wicon">🔓</span>
      <div class="ctitle">Mot de passe <span>oublié ?</span></div>
      <div class="cstep">Entrez votre e-mail pour recevoir<br>un lien de réinitialisation</div>

      <div id="ab" class="alert"></div>

      <div class="f">
        <label>✉️ Votre adresse e-mail</label>
        <div class="iw"><span class="ic">✉️</span><input type="email" id="email" placeholder="exemple@mail.com" autocomplete="email"></div>
      </div>

      <button class="btn" id="sbtn" onclick="go()">
        <div class="bi"><div class="sp" id="sp"></div><span id="bt">📨 Envoyer le lien</span></div>
      </button>

      <a href="nnp-login.html" class="back">← Retour à la connexion</a>
    </div>

    <!-- STEP 2 : Succès -->
    <div class="step-view" id="step2">
      <div class="success-box">
        <span class="s-icon">📬</span>
        <div class="s-title">E-mail envoyé !</div>
        <div class="s-msg">Un lien de réinitialisation a été envoyé à<br><span class="s-email" id="sentEmail"></span><br><br>Vérifiez votre boîte de réception et vos spams.</div>
        <button class="btn" onclick="window.location.href='nnp-login.html'">← Retour à la connexion</button>
      </div>
    </div>

  </div>

</div>
<script>
const{createClient}=supabase;
const sb=createClient('https://erflpsvmzzzimwghtyws.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVyZmxwc3Ztenp6aW13Z2h0eXdzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxOTE3ODksImV4cCI6MjA5MTc2Nzc4OX0._EDOiDj__5qSxb0OIT59KNt-90elU0ZjECZGHZRkjrI');

function alert2(msg,type='err'){const b=document.getElementById('ab');b.className='alert '+type;b.innerHTML=(type==='err'?'⚠️ ':'✅ ')+msg;}
function setLoad(on){const btn=document.getElementById('sbtn'),sp=document.getElementById('sp'),tx=document.getElementById('bt');btn.disabled=on;sp.style.display=on?'block':'none';tx.textContent=on?'Envoi en cours...':'📨 Envoyer le lien';}

async function go(){
  const email=document.getElementById('email').value.trim();
  if(!email||!email.includes('@')) return alert2('Veuillez entrer une adresse e-mail valide.');
  setLoad(true);
  try{
    const{error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:window.location.origin+'/nnp-reset.html'});
    if(error) throw error;
    document.getElementById('sentEmail').textContent=email;
    document.getElementById('step1').classList.remove('active');
    document.getElementById('step2').classList.add('active');
  }catch(e){
    alert2('Erreur : '+(e.message||'Veuillez réessayer.'));
    setLoad(false);
  }
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')go();});
</script>
</body>
</html>
