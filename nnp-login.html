<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NNP — Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--orange:#ff8c00;--orange-l:#ffaa33;--cyan:#00c8ff;--navy:#0a0f1e;--card:#111827;--card2:#0f1b2d;--border:rgba(255,255,255,0.08);--text:#e8f0ff;--muted:rgba(255,255,255,0.38);--error:#ff4d6d;--ok:#00e5a0;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100vh;background:var(--navy);font-family:'Nunito',sans-serif;color:var(--text);overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 70% 50% at 100% 0%,rgba(0,85,200,.18) 0%,transparent 60%),radial-gradient(ellipse 50% 40% at 0% 100%,rgba(255,140,0,.1) 0%,transparent 60%);pointer-events:none;}
.gbg{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:48px 48px;}
.page{position:relative;z-index:10;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:36px 16px 52px;}

/* LOGO */
.lhdr{display:flex;flex-direction:column;align-items:center;gap:4px;margin-bottom:26px;animation:fadeD .7s cubic-bezier(.16,1,.3,1) both;}
.lrow{display:flex;align-items:center;gap:10px;}
.lbars{display:flex;align-items:flex-end;gap:3px;height:28px;}
.lb{width:5px;border-radius:2px 2px 1px 1px;animation:bpop .6s cubic-bezier(.34,1.56,.64,1) both;}
.lb1{height:28px;background:linear-gradient(180deg,var(--cyan),#0044ff);animation-delay:.1s;}
.lb2{height:17px;background:linear-gradient(180deg,rgba(0,200,255,.6),rgba(0,68,255,.6));animation-delay:.15s;}
.lb3{height:24px;background:linear-gradient(180deg,var(--cyan),#0044ff);animation-delay:.2s;}
.lb4{height:12px;background:linear-gradient(180deg,rgba(0,200,255,.3),rgba(0,68,255,.3));animation-delay:.25s;}
.lb5{height:28px;background:linear-gradient(180deg,var(--cyan),#0044ff);animation-delay:.3s;box-shadow:0 0 10px rgba(0,200,255,.5);}
@keyframes bpop{from{transform:scaleY(0);transform-origin:bottom;}to{transform:scaleY(1);transform-origin:bottom;}}
.lnnp{font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:5px;line-height:1;background:linear-gradient(160deg,#fff 0%,#c8f0ff 40%,var(--cyan) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 12px rgba(0,200,255,.3));}
.lsub{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:3.5px;color:rgba(0,200,255,.45);text-transform:uppercase;}

/* CARD */
.card{width:100%;max-width:420px;background:linear-gradient(160deg,var(--card) 0%,var(--card2) 100%);border:1px solid var(--border);border-radius:24px;padding:36px 28px 36px;position:relative;overflow:hidden;box-shadow:0 0 0 1px rgba(255,255,255,.03),0 0 60px rgba(0,40,120,.3),0 32px 64px rgba(0,0,0,.5);animation:fadeU .8s cubic-bezier(.16,1,.3,1) .1s both;}
.card::before{content:'';position:absolute;top:0;left:10%;right:10%;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:.6;}
.cn{position:absolute;width:14px;height:14px;}
.ctl{top:12px;left:12px;border-top:1.5px solid rgba(0,200,255,.4);border-left:1.5px solid rgba(0,200,255,.4);}
.ctr{top:12px;right:12px;border-top:1.5px solid rgba(0,200,255,.4);border-right:1.5px solid rgba(0,200,255,.4);}
.cbl{bottom:12px;left:12px;border-bottom:1.5px solid rgba(255,140,0,.3);border-left:1.5px solid rgba(255,140,0,.3);}
.cbr{bottom:12px;right:12px;border-bottom:1.5px solid rgba(255,140,0,.3);border-right:1.5px solid rgba(255,140,0,.3);}

/* Welcome icon */
.wicon{font-size:44px;margin-bottom:10px;display:block;text-align:center;animation:bounce 1s ease .5s both;}
@keyframes bounce{0%{transform:scale(0);opacity:0;}70%{transform:scale(1.15);}100%{transform:scale(1);opacity:1;}}

.ctitle{font-size:24px;font-weight:900;color:#fff;letter-spacing:-.3px;margin-bottom:3px;text-align:center;}
.ctitle span{color:var(--cyan);}
.cstep{font-family:'DM Mono',monospace;font-size:9.5px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:28px;text-align:center;}

/* ALERT */
.alert{padding:11px 14px;border-radius:12px;font-size:12px;font-weight:700;display:none;align-items:center;gap:8px;margin-bottom:16px;animation:slin .3s ease;}
.alert.err{display:flex;background:rgba(255,77,109,.09);border:1px solid rgba(255,77,109,.25);color:#ff8fa3;}
.alert.ok{display:flex;background:rgba(0,229,160,.07);border:1px solid rgba(0,229,160,.22);color:var(--ok);}
@keyframes slin{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}

/* FORM */
.fg{display:flex;flex-direction:column;gap:14px;}
.f{display:flex;flex-direction:column;gap:6px;}
label{font-size:11px;font-weight:800;letter-spacing:1.5px;color:rgba(255,255,255,.48);text-transform:uppercase;}
.iw{position:relative;}
.iw .ic{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none;opacity:.5;}
input{width:100%;background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.08);border-radius:12px;padding:13px 13px 13px 40px;color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;outline:none;transition:border-color .2s,box-shadow .2s,background .2s;}
input::placeholder{color:rgba(255,255,255,.18);font-weight:400;}
input:focus{border-color:var(--cyan);background:rgba(0,200,255,.05);box-shadow:0 0 0 3px rgba(0,200,255,.1);}
.eye{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:15px;padding:4px;transition:color .2s;}
.eye:hover{color:var(--cyan);}

.forgot-row{display:flex;justify-content:flex-end;margin-top:-4px;}
.forgot-row a{font-size:12px;font-weight:700;color:var(--orange-l);text-decoration:none;letter-spacing:.5px;}
.forgot-row a:hover{text-decoration:underline;}

/* SUBMIT */
.btn{width:100%;padding:15px;margin-top:4px;background:linear-gradient(135deg,#0044cc,var(--cyan));border:none;border-radius:14px;color:#fff;font-family:'Nunito',sans-serif;font-size:15px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;position:relative;overflow:hidden;transition:transform .15s,box-shadow .2s;box-shadow:0 4px 28px rgba(0,100,255,.35);}
.btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);transition:left .5s;}
.btn:hover::before{left:100%;}
.btn:hover{transform:translateY(-1px);box-shadow:0 8px 36px rgba(0,100,255,.5);}
.btn:active{transform:translateY(0);}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.bi{display:flex;align-items:center;justify-content:center;gap:10px;}
.sp{width:17px;height:17px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg);}}

/* DIVIDER */
.div-row{display:flex;align-items:center;gap:12px;margin:4px 0;}
.dl{flex:1;height:1px;background:rgba(255,255,255,.07);}
.dt{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.2);text-transform:uppercase;}

.cfooter{text-align:center;font-size:13px;font-weight:600;color:var(--muted);}
.cfooter a{color:var(--orange-l);text-decoration:none;}
.cfooter a:hover{text-decoration:underline;}

@keyframes fadeU{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeD{from{opacity:0;transform:translateY(-16px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<div class="gbg"></div>
<div class="page">

  <div class="lhdr">
    <div class="lrow">
      <div class="lbars"><div class="lb lb1"></div><div class="lb lb2"></div><div class="lb lb3"></div><div class="lb lb4"></div><div class="lb lb5"></div></div>
      <div class="lnnp">NNP</div>
    </div>
    <div class="lsub">New Numeric Platform</div>
  </div>

  <div class="card">
    <div class="cn ctl"></div><div class="cn ctr"></div><div class="cn cbl"></div><div class="cn cbr"></div>

    <span class="wicon">👋</span>
    <div class="ctitle">Bon <span>retour</span> !</div>
    <div class="cstep">🔐 Connectez-vous à votre compte</div>

    <div id="ab" class="alert"></div>

    <div class="fg">

      <div class="f">
        <label>✉️ Adresse e-mail</label>
        <div class="iw"><span class="ic">✉️</span><input type="email" id="email" placeholder="exemple@mail.com" autocomplete="email"></div>
      </div>

      <div class="f">
        <label>🔒 Mot de passe</label>
        <div class="iw"><span class="ic">🔒</span><input type="password" id="mdp" placeholder="••••••••" autocomplete="current-password"><button class="eye" type="button" onclick="tp()">👁</button></div>
      </div>

      <div class="forgot-row">
        <a href="nnp-forgot.html">Mot de passe oublié ?</a>
      </div>

    </div>

    <button class="btn" id="sbtn" onclick="go()" style="margin-top:20px;">
      <div class="bi"><div class="sp" id="sp"></div><span id="bt">🔑 Se connecter</span></div>
    </button>

    <div class="div-row" style="margin-top:18px;"><div class="dl"></div><div class="dt">ou</div><div class="dl"></div></div>

    <div class="cfooter">Pas encore de compte ? <a href="nnp-inscription.html">S'inscrire →</a></div>
  </div>

</div>
<script>
const{createClient}=supabase;
const sb=createClient('https://wjvprhqdmithkltybdfd.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndqdnByaHFkbWl0aGtsdHliZGZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODMzMDQsImV4cCI6MjA5MTg1OTMwNH0.H5pGOD_oDjymwBP27RK7_yuogSW5wA7FE8McQxcd7WE');

function tp(){const i=document.getElementById('mdp'),b=document.querySelector('.eye');i.type=i.type==='password'?'text':'password';b.textContent=i.type==='password'?'👁':'🙈';}
function alert2(msg,type='err'){const b=document.getElementById('ab');b.className='alert '+type;b.innerHTML=(type==='err'?'⚠️ ':'✅ ')+msg;b.scrollIntoView({behavior:'smooth',block:'nearest'});}
function setLoad(on){const btn=document.getElementById('sbtn'),sp=document.getElementById('sp'),tx=document.getElementById('bt');btn.disabled=on;sp.style.display=on?'block':'none';tx.textContent=on?'Connexion...':'🔑 Se connecter';}

async function go(){
  const email=document.getElementById('email').value.trim();
  const mdp=document.getElementById('mdp').value;
  if(!email||!email.includes('@')) return alert2('Veuillez entrer votre adresse e-mail.');
  if(!mdp) return alert2('Veuillez entrer votre mot de passe.');
  setLoad(true);
  try{
    const{data,error}=await sb.auth.signInWithPassword({email,password:mdp});
    if(error) throw error;

    // Vérifier statut du compte
    const{data:user}=await sb.from('utilisateurs').select('statut').eq('id',data.user.id).single();
    if(user?.statut==='en_attente'){
      alert2('Votre compte n\'est pas encore activé. <a href="nnp-activation.html" style="color:var(--cyan)">Activer maintenant →</a>');
      setLoad(false); return;
    }
    alert2('Connexion réussie ! Redirection...','ok');
    setTimeout(()=>{window.location.href='nnp-dashboard.html';},1500);
  }catch(e){
    const m=e.message||'';
    if(m.includes('Invalid')||m.includes('credentials')) alert2('Email ou mot de passe incorrect.');
    else alert2('Erreur : '+(m||'Veuillez réessayer.'));
    setLoad(false);
  }
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')go();});
</script>
</body>
</html>
