<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NNP — Classement</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--orange:#ff8c00;--orange-l:#ffaa33;--cyan:#00c8ff;--navy:#0a0f1e;--card:#111827;--card2:#0f1b2d;--border:rgba(255,255,255,0.08);--text:#e8f0ff;--muted:rgba(255,255,255,0.38);--ok:#00e5a0;--nav-h:66px;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100vh;background:var(--navy);font-family:'Nunito',sans-serif;color:var(--text);overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(255,140,0,.1) 0%,transparent 60%);pointer-events:none;}
.gbg{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:48px 48px;}
.main{padding-top:68px;padding-bottom:calc(var(--nav-h)+40px);position:relative;z-index:10;}
.cont{max-width:480px;margin:0 auto;padding:16px 14px 0;}
.topbar{position:fixed;top:0;left:0;right:0;z-index:100;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:rgba(10,15,30,.88);backdrop-filter:blur(14px);border-bottom:1px solid rgba(255,255,255,.06);}
.back{color:var(--muted);font-size:13px;font-weight:800;text-decoration:none;padding:7px 10px;border-radius:10px;}
.back:hover{color:#fff;}
.page-ttl{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;}
.page-ttl span{color:var(--orange-l);}

/* PODIUM TOP 3 */
.podium{display:flex;align-items:flex-end;justify-content:center;gap:10px;margin-bottom:20px;padding:20px 10px 0;}
.pod{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;max-width:130px;}
.pod-avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;border:3px solid transparent;position:relative;}
.pod1 .pod-avatar{width:64px;height:64px;background:linear-gradient(135deg,#FFD700,#FFA500);border-color:#FFD700;box-shadow:0 0 20px rgba(255,215,0,.4);}
.pod2 .pod-avatar{width:52px;height:52px;background:linear-gradient(135deg,#C0C0C0,#A0A0A0);border-color:#C0C0C0;}
.pod3 .pod-avatar{width:48px;height:48px;background:linear-gradient(135deg,#CD7F32,#A0522D);border-color:#CD7F32;}
.pod-crown{position:absolute;top:-14px;font-size:18px;}
.pod-name{font-size:12px;font-weight:900;color:#fff;text-align:center;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pod-fill{border-radius:12px 12px 0 0;display:flex;align-items:center;justify-content:center;width:100%;}
.pod1 .pod-fill{height:80px;background:linear-gradient(180deg,rgba(255,215,0,.2),rgba(255,215,0,.05));border:1px solid rgba(255,215,0,.3);}
.pod2 .pod-fill{height:60px;background:linear-gradient(180deg,rgba(192,192,192,.15),rgba(192,192,192,.03));border:1px solid rgba(192,192,192,.2);}
.pod3 .pod-fill{height:46px;background:linear-gradient(180deg,rgba(205,127,50,.15),rgba(205,127,50,.03));border:1px solid rgba(205,127,50,.2);}
.pod-stat{font-family:'Bebas Neue',sans-serif;font-size:16px;color:rgba(255,255,255,.7);}
.pod-medal{font-size:20px;}

/* ONGLETS */
.tabs{display:flex;gap:6px;margin-bottom:14px;}
.tab{flex:1;padding:9px;border-radius:12px;border:1.5px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);font-family:'DM Mono',monospace;font-size:10px;font-weight:800;letter-spacing:1px;color:var(--muted);cursor:pointer;text-align:center;text-transform:uppercase;transition:all .2s;-webkit-tap-highlight-color:transparent;}
.tab.active{border-color:var(--orange);background:rgba(255,140,0,.1);color:var(--orange-l);}

/* LISTE */
.rank-item{background:linear-gradient(145deg,var(--card),var(--card2));border:1px solid var(--border);border-radius:16px;padding:13px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;transition:all .2s;}
.rank-item.me{border-color:rgba(0,200,255,.3);background:linear-gradient(145deg,#0f1b2d,#0a1520);}
.ri-num{font-family:'Bebas Neue',sans-serif;font-size:20px;width:28px;text-align:center;flex-shrink:0;}
.ri-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;color:#fff;flex-shrink:0;}
.ri-info{flex:1;}
.ri-name{font-size:13.5px;font-weight:900;color:#fff;}
.ri-sub{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-top:2px;letter-spacing:1px;}
.ri-right{text-align:right;flex-shrink:0;}
.ri-val{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--orange-l);}
.ri-lbl{font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.me-badge{font-family:'DM Mono',monospace;font-size:8px;padding:2px 6px;background:rgba(0,200,255,.1);border:1px solid rgba(0,200,255,.2);border-radius:6px;color:var(--cyan);}

.bot-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;height:var(--nav-h);background:rgba(10,15,30,.93);backdrop-filter:blur(16px);border-top:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:space-around;padding:0 6px;}
.ni{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 14px;border-radius:13px;text-decoration:none;color:var(--muted);transition:all .2s;flex:1;-webkit-tap-highlight-color:transparent;}
.ni.active{color:var(--orange-l);background:rgba(255,140,0,.08);}
.ni-ico{font-size:20px;} .ni-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;}
.ni-center{background:linear-gradient(135deg,var(--orange),var(--orange-l));border-radius:16px;padding:9px 18px;box-shadow:0 4px 20px rgba(255,140,0,.4);color:#fff!important;}
.ni-center .ni-lbl,.ni-center .ni-ico{color:#fff;}
.ld{display:inline-block;width:20px;height:20px;border:2px solid rgba(255,255,255,.15);border-top-color:var(--orange);border-radius:50%;animation:spin .7s linear infinite;}
.empty{text-align:center;padding:30px;color:var(--muted);font-size:13px;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeU{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<div class="gbg"></div>
<div class="topbar">
  <a href="nnp-gagner.html" class="back">← Retour</a>
  <div class="page-ttl">🏆 <span>Classement</span></div>
  <div style="width:60px"></div>
</div>

<div class="main"><div class="cont">

  <!-- PODIUM TOP 3 -->
  <div class="podium" id="podium">
    <div style="text-align:center;padding:30px;color:var(--muted)"><div class="ld"></div></div>
  </div>

  <!-- ONGLETS -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab('filleuls',this)">👥 Filleuls</div>
    <div class="tab" onclick="switchTab('solde',this)">💰 Solde</div>
    <div class="tab" onclick="switchTab('gains',this)">📈 Gains</div>
  </div>

  <!-- LISTE -->
  <div id="rankList"><div class="empty"><div class="ld"></div></div></div>

  <div style="height:20px"></div>
</div></div>

<div class="bot-nav">
  <a href="nnp-retrait.html" class="ni"><span class="ni-ico">💳</span><span class="ni-lbl">Retirer</span></a>
  <a href="nnp-profil.html" class="ni"><span class="ni-ico">👤</span><span class="ni-lbl">Profil</span></a>
  <a href="nnp-gagner.html" class="ni ni-center"><span class="ni-ico">💰</span><span class="ni-lbl">Gagner</span></a>
  <a href="nnp-evolution.html" class="ni"><span class="ni-ico">📈</span><span class="ni-lbl">Évolution</span></a>
  <a href="nnp-dashboard.html" class="ni"><span class="ni-ico">🏠</span><span class="ni-lbl">Accueil</span></a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const sb = supabase.createClient(
  'https://wjvprhqdmithkltybdfd.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndqdnByaHFkbWl0aGtsdHliZGZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODMzMDQsImV4cCI6MjA5MTg1OTMwNH0.H5pGOD_oDjymwBP27RK7_yuogSW5wA7FE8McQxcd7WE'
);
const fmt = n => Number(n||0).toLocaleString('fr-FR');
const ini = n => n ? n.trim().split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2) : '?';
const COLORS = ['linear-gradient(135deg,#FFD700,#FFA500)','linear-gradient(135deg,#C0C0C0,#909090)','linear-gradient(135deg,#CD7F32,#A0522D)','linear-gradient(135deg,var(--orange),var(--orange-l))','linear-gradient(135deg,var(--cyan),#0044ff)','linear-gradient(135deg,var(--ok),#00b37a)'];

let userId=null, allUsers=[], curTab='filleuls';

async function getUid(){
  try{const{data:{session}}=await sb.auth.getSession();if(session?.user?.id){localStorage.setItem('nnp_uid',session.user.id);return session.user.id;}}catch(e){}
  const uid=localStorage.getItem('nnp_uid');if(uid)return uid;
  const em=localStorage.getItem('nnp_email');
  if(em){const{data:u}=await sb.from('utilisateurs').select('id').eq('email',em).maybeSingle();if(u?.id){localStorage.setItem('nnp_uid',u.id);return u.id;}}
  return null;
}

async function init(){
  userId = await getUid();
  const{data:users}=await sb.from('utilisateurs')
    .select('id,nom,solde,total_filleuls,statut')
    .eq('statut','actif').limit(100);
  allUsers = users||[];
  render('filleuls');
}

function switchTab(tab,el){
  curTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  render(tab);
}

function render(tab){
  const sorted = [...allUsers].sort((a,b)=>{
    if(tab==='filleuls') return (b.total_filleuls||0)-(a.total_filleuls||0);
    if(tab==='solde')    return (b.solde||0)-(a.solde||0);
    return (b.solde||0)-(a.solde||0);
  });

  // PODIUM TOP 3
  const top3 = sorted.slice(0,3);
  const podOrder = top3.length>=2 ? [top3[1],top3[0],top3[2]].filter(Boolean) : top3;
  const podSizes = top3.length>=2 ? ['pod2','pod1','pod3'] : ['pod1'];
  const podMedals = ['🥈','🥇','🥉'];

  document.getElementById('podium').innerHTML = podOrder.map((u,i)=>{
    const cls  = podSizes[i]||'pod3';
    const val  = tab==='filleuls' ? (u.total_filleuls||0)+' filleuls' : fmt(u.solde||0)+' F';
    const isMe = u.id===userId;
    return `<div class="pod ${cls}" style="animation:fadeU .4s ${i*.1}s ease both">
      <div class="pod-avatar">${cls==='pod1'?'<span class="pod-crown">👑</span>':''}${ini(u.nom)}</div>
      <div class="pod-name">${u.nom.split(' ')[0]}${isMe?' (Moi)':''}</div>
      <div class="pod-fill"><div class="pod-stat">${val}</div></div>
      <div class="pod-medal">${podMedals[i]}</div>
    </div>`;
  }).join('');

  // LISTE
  const list = document.getElementById('rankList');
  if(!sorted.length){list.innerHTML='<div class="empty">Aucun membre actif</div>';return;}

  list.innerHTML = sorted.map((u,i)=>{
    const isMe = u.id===userId;
    const val  = tab==='filleuls' ? (u.total_filleuls||0) : fmt(u.solde||0)+' F';
    const lbl  = tab==='filleuls' ? 'filleuls' : 'FCFA';
    const numColor = i===0?'#FFD700':i===1?'#C0C0C0':i===2?'#CD7F32':'var(--muted)';
    return `<div class="rank-item ${isMe?'me':''}" style="animation:fadeU .3s ${Math.min(i*.04,.5)}s ease both">
      <div class="ri-num" style="color:${numColor}">${i<3?['🥇','🥈','🥉'][i]:'#'+(i+1)}</div>
      <div class="ri-avatar" style="background:${COLORS[i%COLORS.length]}">${ini(u.nom)}</div>
      <div class="ri-info">
        <div class="ri-name">${u.nom} ${isMe?'<span class="me-badge">MOI</span>':''}</div>
        <div class="ri-sub">Rang #${i+1} · Membre actif</div>
      </div>
      <div class="ri-right">
        <div class="ri-val">${tab==='filleuls'?u.total_filleuls||0:fmt(u.solde||0)+' F'}</div>
        <div class="ri-lbl">${lbl}</div>
      </div>
    </div>`;
  }).join('');
}

init();
</script>
</body>
</html>
