<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NNP — Retrait</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--orange:#ff8c00;--orange-l:#ffaa33;--cyan:#00c8ff;--navy:#0a0f1e;--card:#111827;--card2:#0f1b2d;--border:rgba(255,255,255,0.08);--text:#e8f0ff;--muted:rgba(255,255,255,0.38);--ok:#00e5a0;--error:#ff4d6d;--nav-h:66px;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100vh;background:var(--navy);font-family:'Nunito',sans-serif;color:var(--text);overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 70% 50% at 0% 0%,rgba(0,85,200,.15) 0%,transparent 60%),radial-gradient(ellipse 50% 40% at 100% 100%,rgba(255,140,0,.08) 0%,transparent 60%);pointer-events:none;}
.gbg{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:48px 48px;}

/* TOP BAR */
.topbar{position:fixed;top:0;left:0;right:0;z-index:100;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:rgba(10,15,30,.88);backdrop-filter:blur(14px);border-bottom:1px solid rgba(255,255,255,.06);}
.back{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:13px;font-weight:800;text-decoration:none;padding:7px 10px;border-radius:10px;transition:all .2s;}
.back:hover{color:#fff;background:rgba(255,255,255,.06);}
.page-ttl{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;}
.page-ttl span{color:var(--orange);}

/* MAIN */
.main{padding-top:68px;padding-bottom:calc(var(--nav-h)+24px);position:relative;z-index:10;}
.cont{max-width:480px;margin:0 auto;padding:16px 14px 0;}

/* SOLDE CARD */
.solde-card{background:linear-gradient(135deg,#0d1528,#112040,#0a1424);border:1px solid rgba(0,200,255,.15);border-radius:20px;padding:20px;margin-bottom:16px;position:relative;overflow:hidden;animation:fadeU .5s ease both;}
.solde-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--orange),var(--cyan),var(--orange));opacity:.5;}
.solde-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.solde-lbl{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:rgba(255,255,255,.32);text-transform:uppercase;}
.solde-badge{font-family:'DM Mono',monospace;font-size:9px;padding:3px 9px;background:rgba(0,229,160,.1);border:1px solid rgba(0,229,160,.2);border-radius:20px;color:var(--ok);}
.solde-val{font-family:'Bebas Neue',sans-serif;font-size:46px;letter-spacing:2px;background:linear-gradient(135deg,#fff 40%,var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:4px;}
.solde-sub{font-size:11px;color:var(--muted);font-weight:600;}

/* MONTANTS RAPIDES */
.quick-section{margin-bottom:16px;animation:fadeU .5s .05s ease both;}
.qs-title{font-size:11px;font-weight:800;letter-spacing:1.5px;color:rgba(255,255,255,.4);text-transform:uppercase;margin-bottom:10px;}
.quick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.qb{padding:10px 6px;background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.07);border-radius:11px;text-align:center;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;}
.qb:active{transform:scale(.96);}
.qb.selected{border-color:var(--orange);background:rgba(255,140,0,.1);box-shadow:0 0 12px rgba(255,140,0,.12);}
.qb-val{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:#fff;}
.qb.selected .qb-val{color:var(--orange-l);}
.qb-lbl{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-top:1px;}

/* CARD FORM */
.card{background:linear-gradient(145deg,var(--card),var(--card2));border:1px solid var(--border);border-radius:20px;padding:20px 18px 22px;position:relative;overflow:hidden;animation:fadeU .5s .1s ease both;margin-bottom:14px;}
.card::before{content:'';position:absolute;top:0;left:10%;right:10%;height:2px;background:linear-gradient(90deg,transparent,var(--orange),transparent);opacity:.5;}
.cn{position:absolute;width:12px;height:12px;}
.ctl{top:10px;left:10px;border-top:1.5px solid rgba(255,140,0,.35);border-left:1.5px solid rgba(255,140,0,.35);}
.ctr{top:10px;right:10px;border-top:1.5px solid rgba(255,140,0,.35);border-right:1.5px solid rgba(255,140,0,.35);}
.cbl{bottom:10px;left:10px;border-bottom:1.5px solid rgba(0,200,255,.25);border-left:1.5px solid rgba(0,200,255,.25);}
.cbr{bottom:10px;right:10px;border-bottom:1.5px solid rgba(0,200,255,.25);border-right:1.5px solid rgba(0,200,255,.25);}
.card-title{font-size:15px;font-weight:900;color:#fff;margin-bottom:14px;display:flex;align-items:center;gap:8px;}

/* FORM */
.f{display:flex;flex-direction:column;gap:5px;margin-bottom:13px;}
.f:last-of-type{margin-bottom:0;}
label{font-size:10px;font-weight:800;letter-spacing:1.5px;color:rgba(255,255,255,.42);text-transform:uppercase;}
.iw{position:relative;}
.ic{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;opacity:.45;}
input,select{width:100%;background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.08);border-radius:11px;padding:11px 12px 11px 36px;color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none;appearance:none;}
select{cursor:pointer;padding-right:32px;}
option{background:#111827;color:#fff;}
.sa{position:absolute;right:11px;top:50%;transform:translateY(-50%);pointer-events:none;opacity:.4;font-size:11px;}
input::placeholder{color:rgba(255,255,255,.18);font-weight:400;}
input:focus,select:focus{border-color:var(--orange);background:rgba(255,140,0,.05);box-shadow:0 0 0 3px rgba(255,140,0,.1);}
input.big{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;text-align:center;padding-left:12px;}
input.big::placeholder{font-size:18px;}

/* MIN BADGE */
.min-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;background:rgba(0,200,255,.07);border:1px solid rgba(0,200,255,.15);border-radius:20px;font-family:'DM Mono',monospace;font-size:10px;color:var(--cyan);margin-top:6px;}

/* ALERT */
.alert{padding:10px 13px;border-radius:11px;font-size:12px;font-weight:700;display:none;align-items:center;gap:8px;margin-bottom:12px;line-height:1.5;}
.alert.err{display:flex;background:rgba(255,77,109,.09);border:1px solid rgba(255,77,109,.25);color:#ff8fa3;}
.alert.ok{display:flex;background:rgba(0,229,160,.07);border:1px solid rgba(0,229,160,.22);color:var(--ok);}
@keyframes slin{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}

/* BTN */
.btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--orange),var(--orange-l));border:none;border-radius:13px;color:#fff;font-family:'Nunito',sans-serif;font-size:14px;font-weight:900;letter-spacing:1px;text-transform:uppercase;cursor:pointer;position:relative;overflow:hidden;transition:transform .15s,box-shadow .2s;box-shadow:0 4px 26px rgba(255,140,0,.35);margin-top:4px;}
.btn:hover:not(:disabled){transform:translateY(-1px);}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none;}
.bi{display:flex;align-items:center;justify-content:center;gap:10px;}
.sp{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg);}}

/* HISTORIQUE RETRAITS */
.hist-card{background:linear-gradient(145deg,var(--card),var(--card2));border:1px solid var(--border);border-radius:18px;padding:16px;animation:fadeU .5s .2s ease both;}
.hist-title{font-size:13px;font-weight:900;color:#fff;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.hist-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.hist-item:last-child{border-bottom:none;padding-bottom:0;}
.hist-ico{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.hi-pend{background:rgba(255,140,0,.1);}
.hi-ok{background:rgba(0,229,160,.1);}
.hi-rej{background:rgba(255,77,109,.1);}
.hist-info{flex:1;}
.hist-method{font-size:13px;font-weight:800;color:#fff;}
.hist-date{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-top:2px;}
.hist-amount{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;}
.ha-pend{color:var(--orange-l);}
.ha-ok{color:var(--ok);}
.ha-rej{color:var(--error);}
.hist-status{font-family:'DM Mono',monospace;font-size:9px;padding:2px 8px;border-radius:10px;margin-top:2px;display:inline-block;}
.hs-pend{background:rgba(255,140,0,.1);color:var(--orange-l);}
.hs-ok{background:rgba(0,229,160,.1);color:var(--ok);}
.hs-rej{background:rgba(255,77,109,.1);color:#ff8fa3;}
.empty-hist{text-align:center;padding:20px;color:var(--muted);font-size:13px;font-weight:600;}

/* BOTTOM NAV */
.bot-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;height:var(--nav-h);background:rgba(10,15,30,.93);backdrop-filter:blur(16px);border-top:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:space-around;padding:0 6px;}
.ni{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 14px;border-radius:13px;cursor:pointer;text-decoration:none;color:var(--muted);transition:all .2s;flex:1;-webkit-tap-highlight-color:transparent;}
.ni:hover,.ni.active{color:var(--orange-l);}
.ni.active{background:rgba(255,140,0,.08);}
.ni-ico{font-size:20px;}
.ni-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;}
.ni-center{background:linear-gradient(135deg,var(--orange),var(--orange-l));border-radius:16px;padding:9px 18px;box-shadow:0 4px 20px rgba(255,140,0,.4);color:#fff!important;}
.ni-center .ni-lbl,.ni-center .ni-ico{color:#fff;}

/* SPIN LOADING */
.ld{text-align:center;padding:20px;color:var(--muted);}
.spin2{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.15);border-top-color:var(--cyan);border-radius:50%;animation:spin .7s linear infinite;}

@keyframes fadeU{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<div class="gbg"></div>

<div class="topbar">
  <a href="nnp-dashboard.html" class="back">← Retour</a>
  <div class="page-ttl">Mon <span>Retrait</span></div>
  <div style="width:70px"></div>
</div>

<div class="main">
  <div class="cont">

    <!-- SOLDE -->
    <div class="solde-card">
      <div class="solde-top">
        <div class="solde-lbl">💼 Solde disponible</div>
        <div class="solde-badge">Retirable</div>
      </div>
      <div class="solde-val" id="soldeVal">—</div>
      <div class="solde-sub">FCFA · Minimum de retrait : <strong style="color:var(--orange-l)">500 F</strong></div>
    </div>

    <!-- MONTANTS RAPIDES -->
    <div class="quick-section">
      <div class="qs-title">⚡ Montant rapide</div>
      <div class="quick-grid">
        <div class="qb" onclick="setMontant(500)"><div class="qb-val">500</div><div class="qb-lbl">FCFA</div></div>
        <div class="qb" onclick="setMontant(1000)"><div class="qb-val">1K</div><div class="qb-lbl">FCFA</div></div>
        <div class="qb" onclick="setMontant(2000)"><div class="qb-val">2K</div><div class="qb-lbl">FCFA</div></div>
        <div class="qb" onclick="setMontantTout()"><div class="qb-val">MAX</div><div class="qb-lbl">Tout</div></div>
      </div>
    </div>

    <!-- FORMULAIRE -->
    <div class="card">
      <div class="cn ctl"></div><div class="cn ctr"></div><div class="cn cbl"></div><div class="cn cbr"></div>
      <div class="card-title">💳 Formulaire de retrait</div>

      <div id="alertBox" class="alert"></div>

      <div class="f">
        <label>Montant à retirer (FCFA)</label>
        <div class="iw">
          <input type="number" id="montant" class="big" placeholder="500" min="500" oninput="updateMontant(this.value)">
        </div>
        <div class="min-badge">💡 Minimum : 500 FCFA · Maximum : votre solde</div>
      </div>

      <div class="f">
        <label>Moyen de paiement</label>
        <div class="iw">
          <span class="ic">💳</span>
          <select id="methode" onchange="updateNumLabel()">
            <option value="">— Sélectionner —</option>
            <option>Orange Money</option>
            <option>MTN Money</option>
            <option>Wave</option>
            <option>Moov Money</option>
            <option>Free Money</option>
            <option>USDT BSC</option>
            <option>Bitcoin BTC</option>
            <option>Solana SOL</option>
          </select>
          <span class="sa">▼</span>
        </div>
      </div>

      <div class="f">
        <label id="numLabel">Numéro / Adresse de réception</label>
        <div class="iw">
          <span class="ic">📱</span>
          <input type="text" id="numero" placeholder="Votre numéro ou adresse wallet">
        </div>
      </div>

      <div class="f">
        <label>Nom du compte</label>
        <div class="iw">
          <span class="ic">👤</span>
          <input type="text" id="nomCompte" placeholder="Votre nom sur le compte">
        </div>
      </div>

      <button class="btn" id="submitBtn" onclick="go()">
        <div class="bi"><div class="sp" id="sp"></div><span id="bt">📤 Demander le retrait</span></div>
      </button>

    </div>

    <!-- HISTORIQUE -->
    <div class="hist-card">
      <div class="hist-title">📋 Historique des retraits</div>
      <div id="histList"><div class="ld"><div class="spin2"></div></div></div>
    </div>

    <div style="height:20px"></div>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bot-nav">
  <a href="nnp-retrait.html" class="ni active"><span class="ni-ico">💳</span><span class="ni-lbl">Retirer</span></a>
  <a href="nnp-profil.html" class="ni"><span class="ni-ico">👤</span><span class="ni-lbl">Profil</span></a>
  <a href="nnp-gagner.html" class="ni ni-center"><span class="ni-ico">💰</span><span class="ni-lbl">Gagner</span></a>
  <a href="nnp-evolution.html" class="ni"><span class="ni-ico">📈</span><span class="ni-lbl">Évolution</span></a>
  <a href="nnp-dashboard.html" class="ni"><span class="ni-ico">🏠</span><span class="ni-lbl">Accueil</span></a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const sb = supabase.createClient(
  'https://wjvprhqdmithkltybdfd.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndqdnByaHFkbWl0aGtsdHliZGZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODMzMDQsImV4cCI6MjA5MTg1OTMwNH0.H5pGOD_oDjymwBP27RK7_yuogSW5wA7FE8McQxcd7WE'
);

const fmt   = n => Number(n||0).toLocaleString('fr-FR');
const fdate = d => new Date(d).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'2-digit',hour:'2-digit',minute:'2-digit'});

let userSolde = 0;
let userId    = null;

async function getUid(){
  try{
    const{data:{session}}=await sb.auth.getSession();
    if(session?.user?.id){ localStorage.setItem('nnp_uid',session.user.id); return session.user.id; }
  }catch(e){}
  const lsUid=localStorage.getItem('nnp_uid');
  if(lsUid) return lsUid;
  const em=localStorage.getItem('nnp_email');
  if(em){
    const{data:u}=await sb.from('utilisateurs').select('id').eq('email',em).maybeSingle();
    if(u?.id){ localStorage.setItem('nnp_uid',u.id); return u.id; }
  }
  return null;
}

async function init(){
  userId = await getUid();
  if(!userId){ window.location.href='nnp-login.html'; return; }

  const{data:u}=await sb.from('utilisateurs').select('solde,nom,telephone').eq('id',userId).maybeSingle();
  if(!u){ window.location.href='nnp-login.html'; return; }

  userSolde = u.solde || 0;
  document.getElementById('soldeVal').textContent = fmt(userSolde) + ' F';

  // Pré-remplir le nom
  if(u.nom) document.getElementById('nomCompte').value = u.nom;
  if(u.telephone) document.getElementById('numero').value = u.telephone;

  loadHistorique();
}

function setMontant(val){
  document.getElementById('montant').value = val;
  document.querySelectorAll('.qb').forEach(b=>b.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
}

function setMontantTout(){
  document.getElementById('montant').value = userSolde;
  document.querySelectorAll('.qb').forEach(b=>b.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
}

function updateMontant(){
  document.querySelectorAll('.qb').forEach(b=>b.classList.remove('selected'));
}

function updateNumLabel(){
  const m = document.getElementById('methode').value;
  const lbl = document.getElementById('numLabel');
  if(m.includes('USDT')||m.includes('Bitcoin')||m.includes('Solana')){
    lbl.textContent = 'Adresse wallet de réception';
    document.getElementById('numero').placeholder = 'Votre adresse crypto';
  } else {
    lbl.textContent = 'Numéro de réception';
    document.getElementById('numero').placeholder = 'Votre numéro Mobile Money';
  }
}

function al(msg,t='err'){
  const b=document.getElementById('alertBox');
  b.className='alert '+t;
  b.innerHTML=(t==='err'?'⚠️ ':'✅ ')+msg;
  b.style.display='flex';
  b.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function setLoad(on){
  const btn=document.getElementById('submitBtn'),sp=document.getElementById('sp'),tx=document.getElementById('bt');
  btn.disabled=on; sp.style.display=on?'block':'none';
  tx.textContent=on?'Traitement...':'📤 Demander le retrait';
}

async function go(){
  const montant   = parseInt(document.getElementById('montant').value)||0;
  const methode   = document.getElementById('methode').value;
  const numero    = document.getElementById('numero').value.trim();
  const nomCompte = document.getElementById('nomCompte').value.trim();

  if(montant < 500)         return al('Le montant minimum de retrait est <strong>500 FCFA</strong>.');
  if(montant > userSolde)   return al(`Solde insuffisant. Votre solde est de <strong>${fmt(userSolde)} F</strong>.`);
  if(!methode)              return al('Veuillez sélectionner votre moyen de paiement.');
  if(!numero)               return al('Veuillez entrer votre numéro ou adresse.');
  if(!nomCompte)            return al('Veuillez entrer le nom du compte.');

  setLoad(true);
  try{
    // Vérifier si une demande est déjà en cours
    const{data:exist}=await sb.from('retraits').select('id').eq('user_id',userId).eq('statut','en_attente').maybeSingle();
    if(exist) return al('Vous avez déjà une demande de retrait en attente. Patientez sa validation.');

    const{error}=await sb.from('retraits').insert({
      user_id:      userId,
      montant:      montant,
      methode:      methode,
      numero_compte:numero,
      statut:       'en_attente',
      created_at:   new Date().toISOString()
    });
    if(error) throw error;

    al('✅ Demande de retrait soumise ! Traitement sous 24h.','ok');
    document.getElementById('montant').value='';
    loadHistorique();
  }catch(e){
    al('Erreur : '+(e.message||'Veuillez réessayer.'));
  } finally {
    setLoad(false);
  }
}

async function loadHistorique(){
  const list=document.getElementById('histList');
  const{data:retr}=await sb.from('retraits').select('*').eq('user_id',userId).order('created_at',{ascending:false}).limit(20);
  if(!retr||retr.length===0){
    list.innerHTML='<div class="empty-hist">Aucun retrait effectué pour le moment</div>';
    return;
  }
  const icons={en_attente:'⏳',validé:'✅',rejeté:'❌'};
  const icocls={en_attente:'hi-pend',validé:'hi-ok',rejeté:'hi-rej'};
  const amtcls={en_attente:'ha-pend',validé:'ha-ok',rejeté:'ha-rej'};
  const stcls={en_attente:'hs-pend',validé:'hs-ok',rejeté:'hs-rej'};
  list.innerHTML=retr.map(r=>`
    <div class="hist-item">
      <div class="hist-ico ${icocls[r.statut]||'hi-pend'}">${icons[r.statut]||'⏳'}</div>
      <div class="hist-info">
        <div class="hist-method">${r.methode} · ${r.numero_compte}</div>
        <div class="hist-date">${fdate(r.created_at)}</div>
        <span class="hist-status ${stcls[r.statut]||'hs-pend'}">${r.statut}</span>
      </div>
      <div class="hist-amount ${amtcls[r.statut]||'ha-pend'}">${fmt(r.montant)} F</div>
    </div>`).join('');
}
